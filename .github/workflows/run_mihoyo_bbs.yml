# 工作流名称（自定义，便于识别）
name: MihoyoBBSTools 自动运行

# 触发规则：手动触发 + 每12小时定时触发（UTC 0/12点 → 北京时间8/20点）
on:
  workflow_dispatch:  # 手动触发（测试用）
  schedule:
    - cron: '0 0,12 * * *'  # 每12小时执行一次（UTC时区）

# 全局环境变量（解决Node.js 24兼容问题）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用Node.js 24运行Actions组件
  TZ: Asia/Shanghai  # 时区设置（避免时间相关逻辑出错）

# 核心任务定义
jobs:
  run-bbs-tool:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 超时时间（避免无限运行）

    steps:
      # 步骤1：拉取仓库代码（升级到最新版v4.2.0，兼容Node.js 24）
      - name: 拉取仓库代码
        uses: actions/checkout@v4.2.0

      # 步骤2：配置Python环境（升级到最新版v5.2.0，兼容Node.js 24）
      - name: 配置Python 3.10环境
        uses: actions/setup-python@v5.2.0
        with:
          python-version: '3.10'
          cache: 'pip'  # 缓存pip依赖，加速后续运行

      # 步骤3：升级pip并安装项目依赖
      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt 
          else
            echo "未找到requirements.txt，跳过依赖安装"
          fi

      # 步骤4：执行核心脚本（传递Secrets中的敏感信息）
      - name: 运行MihoyoBBSTools
        env:
          COOKIE: ${{ secrets.COOKIE }}  # 从GitHub Secrets读取Cookie
          # 若需要其他参数（如TOKEN），添加：
          # TOKEN: ${{ secrets.TOKEN }}
        run: |
          # 打印环境信息（调试用）
          echo "Python版本：$(python --version)"
          echo "当前时间：$(date)"
          # 执行项目核心脚本（替换为实际脚本名，如main.py/run.py）
          python main.py

      # 可选步骤：上传运行日志（升级到最新版v4.4.0，兼容Node.js 24）
      - name: 上传运行日志（仅失败时）
        if: failure()  # 仅当脚本运行失败时执行
        uses: actions/upload-artifact@v4.4.0
        with:
          name: run-logs
          path: |
            ./logs
            ./*.log
          retention-days: 7  # 日志保留7天
