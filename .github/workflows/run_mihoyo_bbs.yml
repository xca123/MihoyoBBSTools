name: 米游社多账号自动任务（每12小时）

# 方案1：全局强制Node.js 24（优先推荐，彻底消除警告）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 方案2：若方案1仍有警告，替换上方env为这个（临时允许Node.js 20）
# env:
#   ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,12 * * *'  # 每12小时运行（北京时间8/20点）

jobs:
  run-multi-account:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置Python 3.10环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 执行多账号米游社任务
        env:
          COOKIE_LIST: ${{ secrets.COOKIE_LIST }}
        run: |
          # 创建logs目录（避免日志上传时路径不存在）
          mkdir -p ./logs
          
          # 分割并运行每个Cookie
          echo "$COOKIE_LIST" | awk -F'###' '{for(i=1;i<=NF;i++){gsub(/^[ \t\n]+|[ \t\n]+$/,"",$i); if($i!="") print $i}}' > cookie.tmp
          while IFS= read -r cookie; do
            if [ -n "$cookie" ]; then
              echo -e "\n==================== 运行账号：${cookie:0:20}... ===================="
              # 运行脚本并把日志写入logs目录（方便排查）
              COOKIE="$cookie" python main.py >> ./logs/run.log 2>&1
            fi
          done < cookie.tmp
          rm -f cookie.tmp

      - name: 上传运行日志（仅当logs目录有文件时）
        uses: actions/upload-artifact@v4
        if: always()  # 即使前面步骤失败，也上传日志
        with:
          name: mihoyo-bbs-logs
          path: ./logs/
          retention-days: 3
