name: 米游社自动任务
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,12 * * *'  # 每12小时运行一次（北京时间8点、20点）

jobs:
  run-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行多账号米游社任务
        env:
          COOKIE_LIST: ${{ secrets.COOKIE_LIST }}
        run: |
          echo "$COOKIE_LIST" | while IFS= read -r cookie; do
            if [ -n "$cookie" ]; then
              echo "==================== 运行一个账号 ===================="
              COOKIE="$cookie" python main.py
            fi
          done
