name: Buildx Docker image

on:
  push:
    branches:
      - "master"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: false
        default: "warning"

# 全局设置 Node.js 24 环境变量（核心修复）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  buildx:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        # 确认 actions/checkout@v4 已适配 Node.js 24（官方已更新）
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        # 使用官方最新版（已支持 Node.js 24）
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read GitHub username (lowercase)
        run: |
          echo "LOWER_ACTOR=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get commit hash (short)
        id: commitHash
        run: echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push to GHCR
        # 使用 docker/build-push-action@v6（官方已适配 Node.js 24）
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64/v8,linux/arm/v7
          push: true
          tags: |
            ghcr.io/${{ env.LOWER_ACTOR }}/mihoyo-bbs:latest
            ghcr.io/${{ env.LOWER_ACTOR }}/mihoyo-bbs:${{ steps.date.outputs.today }}
            ghcr.io/${{ env.LOWER_ACTOR }}/mihoyo-bbs:${{ steps.commitHash.outputs.COMMIT_HASH }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
